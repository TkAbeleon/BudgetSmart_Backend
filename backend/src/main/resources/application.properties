# ==========================================
# Spring Boot Application Properties
# ==========================================

# Application
spring.application.name=BudgetSmart
server.port=${APP_PORT:8080}
spring.profiles.active=${APP_PROFILE:dev}

# ==========================================
# Database Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:budgetsmart}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update : Hibernate crée/met à jour les tables automatiquement
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==========================================
# Flyway Configuration
# ==========================================
# Flyway désactivé : Hibernate gère le schéma via ddl-auto=update
spring.flyway.enabled=false

# ==========================================
# Server Configuration
# ==========================================
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:1024}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.budgetsmart=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# N8N Configuration
# ==========================================
n8n.webhook.url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/chat}
n8n.api.key=${N8N_API_KEY:}
n8n.timeout=${N8N_TIMEOUT:30000}

# ==========================================
# Anthropic Claude Configuration
# ==========================================
anthropic.api.key=${ANTHROPIC_API_KEY:}

# ==========================================
# CORS Configuration
# ==========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5678}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# ==========================================
# Jackson Configuration
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ==========================================
# Feature Flags
# ==========================================
feature.alerts.enabled=${FEATURE_ALERTS_ENABLED:true}
feature.savings.enabled=${FEATURE_SAVINGS_ENABLED:true}
feature.chat.enabled=${FEATURE_CHAT_ENABLED:true}

# ==========================================
# Swagger/OpenAPI Configuration
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
