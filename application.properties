# Configuration PostgreSQL pour BudgetSmart
spring.datasource.url=jdbc:postgresql://localhost:5432/budgetsmart
spring.datasource.username=budgetsmart_user
spring.datasource.password=budgetsmart_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuration Flyway (migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Configuration JWT
jwt.secret=budgetsmart_secret_key_very_long_and_secure_string_for_jwt_token_generation
jwt.expiration=86400000 # 24 heures en millisecondes
jwt.refresh-expiration=604800000 # 7 jours en millisecondes

# Configuration N8N
n8n.webhook.url=http://localhost:5678/webhook/chat
n8n.api.key=your-n8n-api-key-here
n8n.timeout=30000

# Configuration Logging
logging.level.com.budgetsmart=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuration Server
server.port=8080
server.servlet.context-path=/api

# Configuration CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Configuration du profil
spring.profiles.active=dev
