version: '3.9'

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: budgetsmart-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       budgetsmart
      POSTGRES_USER:     budgetsmart_user
      POSTGRES_PASSWORD: budgetsmart_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetsmart_user -d budgetsmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Spring Boot ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgetsmart-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/budgetsmart
      SPRING_DATASOURCE_USERNAME: budgetsmart_user
      SPRING_DATASOURCE_PASSWORD: budgetsmart_password
      # App
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET:              ${JWT_SECRET:-changeme_in_production_min32chars}
      JWT_EXPIRATION:          ${JWT_EXPIRATION:-86400000}
      # n8n
      N8N_WEBHOOK_URL:         ${N8N_WEBHOOK_URL:-}
      N8N_API_KEY:             ${N8N_API_KEY:-}
      # Flyway
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
    name: budgetsmart_postgres_data
